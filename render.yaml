# Render Blueprint for the Edubeam LMS review environment.
# One Node web service serves the React SPA + NestJS API on a single origin,
# backed by a managed Postgres database. Connect this repo in the Render
# dashboard (New > Blueprint) and it provisions everything from this file.
#
# Path to production: bump `plan: free` -> a paid tier (removes the ~50s idle
# cold-start) and add a custom domain. No code changes required.

services:
  - type: web
    name: edubeam-lms
    runtime: node
    plan: free
    # Build: install (incl. dev tooling), switch Prisma to Postgres, generate
    # client, push schema, then build the web SPA.
    buildCommand: npm install --include=dev && SEED_FORCE=1 npm run render:build
    # Start: seed the DB on first run only (idempotent), then run the API which
    # also serves the built SPA.
    startCommand: npm run render:start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edubeam-db
          property: connectionString

databases:
  - name: edubeam-db
    plan: free
    databaseName: edubeam
    user: edubeam
